[tool.ruff]
# 目标 Python 版本
target-version = "py312"

# 代码行长度限制
line-length = 100

# 扫描的文件
include = ["*.py"]

# 排除的目录
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.pyc",
]

[tool.ruff.lint]
# 启用的规则集
select = [
    "E",     # pycodestyle 错误
    "W",     # pycodestyle 警告
    "F",     # Pyflakes
    "I",     # isort (import 排序)
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
]

# 忽略的规则
ignore = [
    "E501",  # 行长度（由 formatter 处理）
    "B008",  # 函数调用作为默认参数
]

# 允许自动修复的规则
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
# 测试文件允许更宽松的规则
"tests/**/*.py" = ["S101"]  # 允许 assert

[tool.ruff.lint.isort]
# Import 排序配置
known-first-party = ["backend"]

[tool.ruff.format]
# 格式化配置
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
