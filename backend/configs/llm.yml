# LLM 配置
llm:
  # API 密钥（从环境变量读取，或在此配置）
  api_key: ${OPENAI_API_KEY}

  # API 地址
  base_url: https://api.siliconflow.cn/v1

  # 模型名称（学生 agent 使用）
  # 7B 模型：适合快速开发测试，上下文窗口 32K
  # 72B 模型：更强的理解能力，上下文窗口 128K，适合长对话场景
  # 切换到 72B：将 model 改为 Qwen/Qwen2.5-72B-Instruct 即可
  model: Qwen/Qwen2.5-7B-Instruct

  # 教师 agent 模型（观察模式使用，需要更大上下文窗口用于课后总结）
  # 72B 模型：128K 上下文窗口，可保留 50 条消息历史
  teacher_model: Qwen/Qwen2.5-72B-Instruct

  # 其他参数
  temperature: 0.7
  max_tokens: 2000

# 可用的模型选项
models:
  free:
    # Qwen2.5-7B-Instruct: 32K 上下文窗口，快速响应
    # 建议场景：开发测试、短对话、快速迭代
    - Qwen/Qwen2.5-7B-Instruct

    # Qwen2.5-72B-Instruct: 128K 上下文窗口，深度理解
    # 建议场景：长对话教学、复杂问题分析、生产环境
    # 注意：切换到 72B 后，系统会自动调整上下文限制和消息保留数量
    - Qwen/Qwen2.5-72B-Instruct

  paid:
    - deepseek-ai/DeepSeek-V3
    - THUDM/glm-4-9b-chat

# 模型上下文配置（自动应用，无需手动修改）
# 7B 模型：最大 8000 tokens 输入，保留最近 10 条非系统消息
# 72B 模型：最大 50000 tokens 输入，保留最近 50 条非系统消息
# 配置位置：backend/core/llm_client.py -> MODEL_CONTEXT_LIMITS

# 教学模式对应的温度配置
teaching_temperatures:
  didactic: 0.3
  heuristic: 0.5
  discussion: 0.7

# 学生态度对应的响应概率
student_respond_probabilities:
  active: 0.8
  neutral: 0.5
  passive: 0.2
