# 应用基础配置
app:
  # 服务配置
  host: 0.0.0.0
  port: 8000
  debug: true

  # 应用信息
  name: 教学智能体
  version: 0.1.0

  # CORS 配置
  cors:
    allow_origins:
      - http://localhost:5173
      - http://localhost:5174
    allow_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow_headers:
      - Content-Type
      - Authorization
